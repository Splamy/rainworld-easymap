<!DOCTYPE html>
<html>

<head>

	<link rel="stylesheet" href="keys.css" type="text/css" />
	<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"

	<script src="https://unpkg.com/nav2d@1.4.0/dist/nav2d_deps.min.js"

	<style>
		body {
			background: dimgray;
			margin: 0;
			padding: 0;
		}

		html,
		body,
		.map,
		.fillc {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
		}

		.part {
			position: absolute;
		}

		.map,
		canvas {
			/* IE, only works on <img> tags */
			-ms-interpolation-mode: nearest-neighbor;
			/* Firefox */
			image-rendering: crisp-edges;
			/* Chromium + Safari */
			image-rendering: pixelated;
		}

		.overlay {
			/* neded to be in same drawing group as maps */
			position: fixed;
			z-index: 2;

			width: 100%;
			height: 100%;
		}

		#imgContainer {
			background: darkgray;
			position: fixed;
		}

		#uiCats {
			position: absolute;
			display: flex;
			cursor: pointer;
			z-index: 10;
			left: 0;
			top: 0;
		}

		#uiHelp {
			position: absolute;
			display: flex;
			flex-direction: column;
			gap: 0.2em;
			z-index: 10;
			padding: 4px;
			text-align: right;
			right: 0;
			top: 0;
		}

		/* Hide help on touch devices */
		@media (-moz-touch-enabled: 1),
		(pointer:coarse) {
			#uiHelp {
				display: none;
			}
		}
	</style>
</head>

		class Vec {
			/** @param {number} x, @param {number} y */
			constructor(x, y) {
				this.x = x;
				this.y = y;
			}

			/** @param {Vec} other */
			add(other) {
				return new Vec(this.x + other.x, this.y + other.y);
			}

			/** @returns {[number, number]} */
			toArray() {
				return [this.x, this.y];
			}
		}

		class Part {
			/** @param {string[]} srcs, @param {Vec} off, @param {Vec} size, @param {Con[]} [cons] */
			constructor(key, srcs, off, size, cons) {
				this.key = key;
				this.srcs = srcs;
				this.off = off;
				this.size = size;
				this.cons = cons || [];
			}
		}

		class Con {
			/** @param {string} to, @param {Vec} pos */
			constructor(to, pos) {
				this.to = to;
				this.pos = pos;
			}
		}

		class MapData {
			_nav2d = null;

			/** @param {string} tag, @param icon_src, @param {Vec} mapSize, @param {Vec} off, @param {Part[]} parts */
			constructor(tag, icon_src, mapSize, off, parts) {
				this.tag = tag;
				this.icon_src = icon_src;
				this.mapSize = mapSize;
				this.off = off;
				this.parts = parts;
			}

			getNavMesh() {
				if (this._nav2d) {
					return this._nav2d;
				}

				var contour = [
					new poly2tri.Point(0, 0),
					new poly2tri.Point(0, this.mapSize.y),
					new poly2tri.Point(this.mapSize.x, this.mapSize.y),
					new poly2tri.Point(this.mapSize.x, 0),
				];
				var swctx = new poly2tri.SweepContext(contour);
				for (let part of this.parts) {
					swctx.addHole([
						new poly2tri.Point(part.off.x, part.off.y),
						new poly2tri.Point(part.off.x + part.size.x, part.off.y),
						new poly2tri.Point(part.off.x + part.size.x, part.off.y + part.size.y),
						new poly2tri.Point(part.off.x, part.off.y + part.size.y),
					]);
				}

				swctx.triangulate();
				var triangles = swctx.getTriangles();


				let polygons = [];
				for (let tri of triangles) {
					polygons.push(tri.getPoints());
				}

				const heuristicFunc = () => (polygon, to) => 0;
				const graph = new nav2d.NavMesh(polygons, {
					triangulate: false,
					//heuristicFunc,
				});
				this._nav2d = graph;
				return graph;
			}

			clearNavMesh() {
				this._nav2d = null;
			}

			rectangleOverlap(r1Pos, r1Size, r2Pos, r2Size) {
				return !(r2Pos.x > r1Pos.x + r1Size.x ||
					r2Pos.x + r2Size.x < r1Pos.x ||
					r2Pos.y > r1Pos.y + r1Size.y ||
					r2Pos.y + r2Size.y < r1Pos.y);
			}
		}

			maps.set(map.tag, map);
			const btn = document.createElement("img");
			btn.src = map.icon_src;
			btn.onclick = () => setbg(map.tag);
			btn.ontouchstart = () => setbg(map.tag);
			mapSelections.appendChild(btn);
		}

		function getHash() {
			return window.location.hash.substring(1);
		}

		/** @param {string} hash */
		function setHash(hash) {
			const url = new URL(window.location.toString());
			url.hash = `#${hash}`;
			window.history.pushState({}, '', url);
		}

		function updateHash() {
			const t = pzInstance.getTransform();
			let hash = `${selectedMap},${t.x.toFixed(0)},${t.y.toFixed(0)},${t.scale.toFixed(3)}`;
			setHash(hash);
		}

		function tryRestoreHash() {
			let currentHash = getHash();
			if (!currentHash) {
				return false;
			}

			const hs = currentHash.split(',');
			if (hs.length != 4) {
				return false;
			}

			const t = { x: Number(hs[1]), y: Number(hs[2]), scale: Number(hs[3]) }

			setbg(hs[0], t);
			return true;
		}

				pic = undefined;
			}

				pic.classList.add("map");
				// Create a group for all map parts, most maps are precombined
				// with only one map though.

					//picture.style.border = "4px solid green";
					picture.classList.add("part");
					pic.appendChild(picture);
					let offX = data.off.x + part.off.x;
					let offY = data.off.y + part.off.y;
					picture.style.left = `${offX}px`;
					picture.style.top = `${offY}px`;

					// Append all image variations like webp, png, etc.
					for (let src of part.srcs) {
						let source = document.createElement("source");
						source.srcset = src;
						let ext = src.substring(src.lastIndexOf('.') + 1);
						source.type = `image/${ext}`;
						picture.appendChild(source);
					}

					let source = document.createElement("img");
					source.src = part.srcs[0];
					picture.appendChild(source);
				}

				let cons = getConnections(data);
				if (cons.length > 0) {
					const svgNS = "http://www.w3.org/2000/svg";
					let svg = document.createElementNS(svgNS, "svg");
					svg.classList.add("fillc");
					svg.style.width = `${data.mapSize.x}px`;
					svg.style.height = `${data.mapSize.y}px`;
					pic.appendChild(svg);

					for (let con of cons) {
						if (con.from == WM.Daemon || con.to == WM.Daemon) {
							continue;
						}

						let positions = getConnectionLine(data, con.from, con.to);
						if (!positions) {
							continue;
						}

						let line = document.createElementNS(svgNS, "polyline");
						line.setAttribute("fill", "none");
						let points = positions.map(pos => `${pos.x},${pos.y}`).join(" ");
						line.setAttribute("points", points);

						if (con.from == WM.Daemon || con.to == WM.Daemon) {
							line.setAttribute("stroke", "purple");
							line.setAttribute("stroke-width", "2");
						} else {
							line.setAttribute("stroke", "red");
							line.setAttribute("stroke-width", "4");
						}
						svg.appendChild(line);
					}

					// for (let rect of data.getNavMesh().polygons) {
					// 	let poly = document.createElementNS(svgNS, "polygon");
					// 	poly.setAttribute("fill", "rgba(0, 255, 0, 0.2)");
					// 	let points = rect.points.map(pos => `${pos.x},${pos.y}`).join(" ");
					// 	poly.setAttribute("points", points);
					// 	poly.setAttribute("stroke", "green");
					// 	svg.appendChild(poly);
					// }
				}

				// print dot file for graphviz
				// let dot = `graph G {\nnode [shape=circle]\n`;
				// for (let part of data.parts) {
				// 	if (part.cons.length == 0) {
				// 		continue;
				// 	}

				// 	dot += `  "${part.key}" [label="${part.key}"]\n`;
				// 	for (let con of part.cons) {
				// 		if (part.key < con.to) {
				// 			dot += `  "${part.key}" -- "${con.to}"\n`;
				// 		}
				// 	}
				// }
				// dot += `}`;
				// console.log(dot);


				pic.dataset.mapName = data.tag;
				pan.appendChild(pic);
			}
			pic.style.display = "block";
			canvSize = data.mapSize;
			pan.style.width = `${canvSize.x}px`;
			pan.style.height = `${canvSize.y}px`;

			if (transform) {
				const t = pzInstance.getTransform();
				t.x = transform.x;
				t.y = transform.y;
				t.scale = transform.scale;
			}

			updateHash();
		}

		function debounce(func, timeout = 300) {
			let timer;
			return (...args) => {
				clearTimeout(timer);
				timer = setTimeout(() => { func.apply(this, args); }, timeout);
			};
		}
		let updateHashDebounced = debounce(updateHash, 500);

		/** @param { MapData } map, @returns { Array<{ from: string, to: string, fromPos: Vec, toPos: Vec }> } */
		function getConnections(map) {
			const connections = new Map();
			for (let part of map.parts) {
				for (let con of part.cons) {
					let fromPos = new Vec(part.off.x + con.pos.x, part.off.y + con.pos.y);

					let toPos = new Vec(0, 0);
					findPos: for (let targetPart of map.parts) {
						if (targetPart.key == con.to) {
							toPos = new Vec(targetPart.off.x, targetPart.off.y);

							for (let targetCon of targetPart.cons) {
								if (targetCon.to == part.key) {
									toPos = new Vec(targetPart.off.x + targetCon.pos.x, targetPart.off.y + targetCon.pos.y);
									break findPos;
								}
							}
							console.warn(`Connection ${part.key} -> ${con.to} has no return position, using part offset as fallback.`);
							break findPos;
						}
					}

					const key = [part.key, con.to].sort().join("-");
					if (!connections.has(key)) {
						connections.set(key, { from: part.key, to: con.to, fromPos, toPos });
					}
				}
			}
			return [...connections.values()];
		}

		/** @param { MapData } map @param { string } from @param { string } to @returns { Array<Vec> | null } */
		function getConnectionLine(map, from, to) {
			// Calculate a line that takes the nearest exit of the current part rectangle,
			// then routes in orthogonal lines to the nearest entry of the target part rectangle.
			// The lines should not cross any other part rectangle.

			const fromPart = map.parts.find(p => p.key == from);
			const toPart = map.parts.find(p => p.key == to);
			if (!fromPart || !toPart) {
				return null;
			}

			const fromCon = fromPart.cons.find(c => c.to == to);
			const toCon = toPart.cons.find(c => c.to == from);
			if (!fromCon || !toCon) {
				return null;
			}

			const nearestRelativeExit = (part, pos) => {
				const x = pos.x < part.size.x / 2 ? 0 : part.size.x;
				const distX = pos.x < part.size.x / 2 ? pos.x : part.size.x - pos.x;
				const y = pos.y < part.size.y / 2 ? 0 : part.size.y;
				const distY = pos.y < part.size.y / 2 ? pos.y : part.size.y - pos.y;
				return distX < distY ? new Vec(x, pos.y) : new Vec(pos.x, y);
			};


			let start = nearestRelativeExit(fromPart, fromCon.pos).add(fromPart.off);
			let end = nearestRelativeExit(toPart, toCon.pos).add(toPart.off);

			let nav = map.getNavMesh();
			let subnav = nav.findPath(start, end) ?? [];

			let pos = [];
			pos.push(fromPart.off.add(fromCon.pos));
			pos.push(start);

			for (let p of subnav) {
				pos.push(new Vec(p.x, p.y));
			}

			pos.push(end);
			pos.push(toPart.off.add(toCon.pos));
			return pos;
		}

		if (!tryRestoreHash()) {
			setbg("Vanilla", initialTransform);
		}

		pzInstance.on('transform', function (e) {
			updateHashDebounced();

			const off = 100;
			const t = e.getTransform();

			if (t.x > window.innerWidth - off) {
				pzInstance.moveTo(window.innerWidth - off, t.y);
			} else if (t.x < off - (canvSize.x) * t.scale) {
				pzInstance.moveTo(off - (canvSize.x) * t.scale, t.y);
			}
			if (t.y > window.innerHeight - off) {
				pzInstance.moveTo(t.x, window.innerHeight - off);
			} else if (t.y < off - (canvSize.y) * t.scale) {
				pzInstance.moveTo(t.x, off - (canvSize.y) * t.scale);
			}
		});

		// Image stuff

		/** @type {HTMLCanvasElement} */
		const canv = document.querySelector(".overlay");

		// canv.style.width = `${canvW}px`;
		// canv.style.height = `${canvH}px`;

		/** @type {CanvasRenderingContext2D} */
		const ctx = canv.getContext("2d");
		ctx.imageSmoothingEnabled = false;
		var getRatio = (s) => new Vec(s.x / canv.width, s.y / canv.height);
		let isDrawing;
		let isDbgDrag;
		let dragPart = null;

		canv.onmousedown = (e) => {
			if (e.shiftKey) {
				isDrawing = true;
				ctx.beginPath();
				ctx.lineWidth = 1;
				ctx.strokeStyle = "red";
				ctx.lineJoin = "round";
				ctx.lineCap = "round";
				const ratio = getRatio(canvSize);
				ctx.moveTo(e.offsetX / ratio.x, e.offsetY / ratio.y);
			}

			if (e.ctrlKey) {
				// Find part under mouse
				const mousePos = new Vec(e.offsetX, e.offsetY);
				let map = maps.get(selectedMap);
				if (!map) {
					return;
				}

				for (let part of map.parts) {
					if (mousePos.x >= part.off.x && mousePos.x <= part.off.x + part.size.x
						&& mousePos.y >= part.off.y && mousePos.y <= part.off.y + part.size.y) {
						dragPart = part;
						isDbgDrag = true;
						break;
					}
				}
			}
		};

		canv.oncontextmenu = (e) => { return false; }

		canv.onmousemove = (e) => {
			if (isDrawing) {
				const ratio = getRatio(canvSize);
				ctx.lineTo(e.offsetX / ratio.x, e.offsetY / ratio.y);
				ctx.stroke();
			}
			if (isDbgDrag) {
				dragPart.off.x = e.offsetX - dragPart.size.x / 2;
				dragPart.off.y = e.offsetY - dragPart.size.y / 2;
				let map = maps.get(selectedMap);
				if (!map) {
					return;
				}
				map.clearNavMesh();
				setbg(selectedMap, undefined, true);
			}
		};

		canv.onmouseup = function () {
			if (isDrawing) {
				isDrawing = false;
				ctx.closePath();
			}

			if (isDbgDrag) {
				isDbgDrag = false;
				dragPart = null;

				// Print new part data for debugging
				let map = maps.get(selectedMap);
				if (!map) {
					return;
				}

				let output = `part,offX,offY\n`;
				for (let part of map.parts) {
					output += `${part.key},${part.off.x.toFixed(0)},${part.off.y.toFixed(0)}\n`;
				}
				console.log(output);
			}
		};

		document.onkeydown = (e) => {
			if (e.code == "KeyR") {
				ctx.clearRect(0, 0, canv.width, canv.height);
			}
		}
