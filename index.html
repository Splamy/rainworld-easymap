<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
	<title>Rainworld Easymap</title>
	<link rel="stylesheet" href="keys.css" type="text/css" />
	<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"
		integrity="sha256-0dwB5HJ3NFJpgfYQEhC/O15SjlPVMK/7r3ShU8ZnjNU=" crossorigin="anonymous"></script>

	<style>
		body {
			background: dimgray;
			margin: 0;
			padding: 0;
		}

		html,
		body,
		.map,
		.fillc {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
		}

		.part {
			position: absolute;
		}

		.map,
		canvas {
			/* IE, only works on <img> tags */
			-ms-interpolation-mode: nearest-neighbor;
			/* Firefox */
			image-rendering: crisp-edges;
			/* Chromium + Safari */
			image-rendering: pixelated;
		}

		.overlay {
			/* neded to be in same drawing group as maps */
			position: fixed;
			z-index: 2;

			width: 100%;
			height: 100%;
		}

		#imgContainer {
			background: darkgray;
			position: fixed;
		}

		.dbgborder {
			border: black 6px solid;
		}

		#uiCats {
			position: absolute;
			display: flex;
			cursor: pointer;
			z-index: 10;
			left: 0;
			top: 0;
		}

		#uiHelp {
			position: absolute;
			display: flex;
			flex-direction: column;
			gap: 0.2em;
			z-index: 10;
			padding: 4px;
			text-align: right;
			right: 0;
			top: 0;
		}

		/* Hide help on touch devices */
		@media (-moz-touch-enabled: 1),
		(pointer:coarse) {
			#uiHelp {
				display: none;
			}
		}
	</style>
</head>

<body>
	<div id="uiCats">
	</div>
	<div id="uiHelp">
		<span class="light-keys"><kbd>Shift</kbd>+<kbd>Mouse</kbd> to draw</span><br />
		<span class="light-keys"><kbd>R</kbd> to erase</span><br />
	</div>

	<div id="imgContainer" class="">
		<canvas class="overlay" height="3500" width="6000" />
	</div>

	<script>
		//@ts-check

		class Vec {
			/** @param {number} x, @param {number} y */
			constructor(x, y) {
				this.x = x;
				this.y = y;
			}
		}

		class Part {
			/** @param {string[]} srcs, @param {Vec} off */
			constructor(srcs, off) {
				this.srcs = srcs;
				this.off = off;
			}
		}

		class MapData {
			/** @param {string} tag, @param icon_src, @param {Vec} mapSize, @param {Vec} off, @param {Part[]} map_src */
			constructor(tag, icon_src, mapSize, off, map_src) {
				this.tag = tag;
				this.icon_src = icon_src;
				this.mapSize = mapSize;
				this.off = off;
				this.map_src = map_src;
			}
		}

		let selectedMap = null;
		/** @type {HTMLDivElement} */
		const pan = document.getElementById("imgContainer");
		/** @type {HTMLDivElement} */
		const mapSelections = document.getElementById("uiCats");
		const initialTransform = { x: 0, y: 0, scale: 0.2 };
		let pzInstance = panzoom(pan, {
			initialZoom: initialTransform.scale,
			beforeMouseDown: function (e) {
				return e.shiftKey;
			}
		});

		/** @type {Map<string, MapData>} */
		const maps = new Map();

		/**
		* @param {MapData} map
		*/
		function setupMap(map) {
			//const map = new MapData(tag, mapSize, off, map_src);
			maps.set(map.tag, map);
			const btn = document.createElement("img");
			btn.src = map.icon_src;
			btn.onclick = () => setbg(map.tag);
			btn.ontouchstart = () => setbg(map.tag);
			mapSelections.appendChild(btn);
		}

		function getHash() {
			return window.location.hash.substring(1);
		}

		/** @param {string} hash */
		function setHash(hash) {
			const url = window.location;
			url.hash = hash;
			window.history.pushState({}, '', url.toString());
		}

		function updateHash() {
			const t = pzInstance.getTransform();
			let hash = `${selectedMap},${t.x.toFixed(0)},${t.y.toFixed(0)},${t.scale.toFixed(3)}`;
			setHash(hash);
		}

		function tryRestoreHash() {
			let currentHash = getHash();
			if (!currentHash) {
				return false;
			}

			const hs = currentHash.split(',');
			if (hs.length != 4) {
				return false;
			}

			const t = { x: Number(hs[1]), y: Number(hs[2]), scale: Number(hs[3]) }

			setbg(hs[0], t);
			return true;
		}

		/** @param {string} tag, @param {{x: number, y: number, scale: number}} [transform] */
		function setbg(tag, transform) {
			const data = maps.get(tag);
			if (!data) {
				return;
			}

			selectedMap = tag;

			/** @type {HTMLDivElement[]} */
			const imgs = [...pan.querySelectorAll(".map")];
			imgs.forEach(i => i.style.display = "none");
			let pic = imgs.find(i => i.dataset.mapName === data.tag);
			// Create container for slugcat map if it does not exist
			if (!pic) {
				pic = document.createElement("div");
				pic.classList.add("map");
				// Create a group for all map parts, most maps are precombined
				// with only one map though.
				for (let part of data.map_src) {
					let picture = document.createElement("picture");
					picture.classList.add("part");
					pic.appendChild(picture);
					let offX = data.off.x + part.off.x;
					let offY = data.off.y + part.off.y;
					picture.style.left = `${offX}px`;
					picture.style.top = `${offY}px`;

					// Append all image variations like webp, png, etc.
					for (let src of part.srcs) {
						let source = document.createElement("source");
						source.srcset = src;
						let ext = src.substring(src.lastIndexOf('.') + 1);
						source.type = `image/${ext}`;
						picture.appendChild(source);
					}

					let source = document.createElement("img");
					source.src = part.srcs[0];
					picture.appendChild(source);
				}

				pic.dataset.mapName = data.tag;
				pan.appendChild(pic);
			}
			pic.style.display = "block";
			pan.style.width = `${data.mapSize.x}px`;
			pan.style.height = `${data.mapSize.y}px`;

			if (transform) {
				const t = pzInstance.getTransform();
				t.x = transform.x;
				t.y = transform.y;
				t.scale = transform.scale;
			}

			updateHash();
		}

		function debounce(func, timeout = 300) {
			let timer;
			return (...args) => {
				clearTimeout(timer);
				timer = setTimeout(() => { func.apply(this, args); }, timeout);
			};
		}
		let updateHashDebounced = debounce(updateHash, 500);

		/** @param {string} base, @param {string[]} exts, @returns {string[]} */
		let withExt = (base, exts) => exts.map(e => `${base}.${e}`);
		/** @param {string} base */
		let withDefExt = (base) => withExt(base, ['webp', 'png']);
		let withOneDefExt = (base) => [new Part(withDefExt(base), new Vec(0, 0))];
		const defaultSize = new Vec(12000, 7000);

		setupMap(new MapData('Vanilla', "img/Survivor_icon_%28custom%29.png", defaultSize, new Vec(2453, 736), withOneDefExt('img/World_Map_%28Vanilla%29')));
		setupMap(new MapData('Downpour', "img/Gourmand_icon_%28custom%29.png", defaultSize, new Vec(0, 1200), withOneDefExt('img/World_Map_%28Downpour%29')));
		setupMap(new MapData('Artificer', "img/Artificer_icon_%28custom%29.png", defaultSize, new Vec(2180, 0), withOneDefExt('img/World_Map_%28Artificer%29')));
		setupMap(new MapData('Rivulet', "img/Rivulet_icon_%28custom%29.png", defaultSize, new Vec(2180, 1200), withOneDefExt('img/World_Map_%28Rivulet%29')));
		setupMap(new MapData('Spearmaster', "img/Spearmaster_icon_%28custom%29.png", defaultSize, new Vec(2180, 1200), withOneDefExt('img/World_Map_%28Spearmaster%29')));
		setupMap(new MapData('Saint', "img/Saint_icon_%28custom%29.png", defaultSize, new Vec(2180, 2003), withOneDefExt('img/World_Map_%28Saint%29')));
		setupMap(new MapData('Watcher', "img/Watcher_icon_%28custom%29.png", defaultSize, new Vec(0, 0), [
			new Part(withDefExt('img/Watcher/Sunbaked_Alley_Map'), new Vec(0, 0)),
			new Part(withDefExt('img/Watcher/Torrential_Railways_Map'), new Vec(0, 1000)),
			new Part(withDefExt('img/Watcher/Aether_Ridge_Map'), new Vec(0, 2000)),
			new Part(withDefExt('img/Watcher/Badlands_Map'), new Vec(0, 3000)),
			new Part(withDefExt('img/Watcher/Cold_Storage_Map'), new Vec(0, 4000)),
			new Part(withDefExt('img/Watcher/Desolate_Tract_Map'), new Vec(0, 5000)),
			new Part(withDefExt('img/Watcher/Fetid_Glen_Map'), new Vec(0, 6000)),
			new Part(withDefExt('img/Watcher/Fractured_Gateways_Map'), new Vec(0, 7000)),
			new Part(withDefExt('img/Watcher/Heat_Ducts_Map'), new Vec(0, 8000)),
			new Part(withDefExt('img/Watcher/Migration_Path_Map'), new Vec(0, 9000)),
			new Part(withDefExt('img/Watcher/Pillar_Grove_Map'), new Vec(0, 10000)),
			new Part(withDefExt('img/Watcher/Rusted_Wrecks_Map'), new Vec(2000, 0)),
			new Part(withDefExt('img/Watcher/Salination_Map'), new Vec(2000, 1000)),
			new Part(withDefExt('img/Watcher/Shrouded_Stacks_Map'), new Vec(2000, 2000)),
			new Part(withDefExt('img/Watcher/Signal_Spires_Map'), new Vec(2000, 3000)),
			new Part(withDefExt('img/Watcher/Stormy_Coast_Map'), new Vec(2000, 4000)),
			new Part(withDefExt('img/Watcher/The_Surface_Map'), new Vec(2000, 5000)),
			new Part(withDefExt('img/Watcher/Torrid_Desert_Map'), new Vec(2000, 6000)),
			new Part(withDefExt('img/Watcher/Turbulent_Pump_Map'), new Vec(2000, 7000)),
			new Part(withDefExt('img/Watcher/Verdant_Waterways_Map'), new Vec(2000, 8000)),
			new Part(withDefExt('img/Watcher/Crumbling_Fringes_Map'), new Vec(2000, 9000)),
			new Part(withDefExt('img/Watcher/Corrupted_Factories_Map'), new Vec(2000, 10000)),
			new Part(withDefExt('img/Watcher/Decaying_Tunnels_Map'), new Vec(4000, 0)),
			new Part(withDefExt('img/Watcher/Infested_Wastes_Map'), new Vec(4000, 1000)),
			new Part(withDefExt('img/Watcher/Shattered_Terrace_Map'), new Vec(4000, 2000)),
			new Part(withDefExt('img/Watcher/Daemon_Map'), new Vec(4000, 3000)),
			new Part(withDefExt('img/Watcher/Unfortunate_Evolution_Map'), new Vec(4000, 4000)),
			new Part(withDefExt('img/Watcher/Outer_Rim_Map'), new Vec(4000, 5000)),
			new Part(withDefExt('img/Watcher/Ancient_Urban_Map'), new Vec(4000, 6000)),
			new Part(withDefExt('img/Watcher/Coral_Caves_Map'), new Vec(4000, 7000)),
			new Part(withDefExt('img/Watcher/Industrial_Complex_Map_Watcher_(MSC)'), new Vec(4000, 8000))
		]));

		if (!tryRestoreHash()) {
			setbg("Vanilla", initialTransform);
		}

		const canvW = 12000;
		const canvH = 7000;

		pzInstance.on('transform', function (e) {
			updateHashDebounced();

			const off = 100;
			const t = e.getTransform();

			if (t.x > window.innerWidth - off) {
				pzInstance.moveTo(window.innerWidth - off, t.y);
			} else if (t.x < off - (canvW) * t.scale) {
				pzInstance.moveTo(off - (canvW) * t.scale, t.y);
			}
			if (t.y > window.innerHeight - off) {
				pzInstance.moveTo(t.x, window.innerHeight - off);
			} else if (t.y < off - (canvH) * t.scale) {
				pzInstance.moveTo(t.x, off - (canvH) * t.scale);
			}
		});

		// Image stuff

		/** @type {HTMLCanvasElement} */
		const canv = document.querySelector(".overlay");

		// canv.style.width = `${canvW}px`;
		// canv.style.height = `${canvH}px`;

		/** @type {CanvasRenderingContext2D} */
		const ctx = canv.getContext("2d");
		ctx.imageSmoothingEnabled = false;
		const ratioX = canvW / canv.width, ratioY = canvH / canv.height;
		let isDrawing;

		canv.onmousedown = (e) => {
			if (!e.shiftKey) {
				return;
			}

			isDrawing = true;
			ctx.beginPath();
			ctx.lineWidth = 1;
			ctx.strokeStyle = "red";
			ctx.lineJoin = "round";
			ctx.lineCap = "round";
			ctx.moveTo(e.offsetX / ratioX, e.offsetY / ratioY);
		};

		canv.oncontextmenu = (e) => { return false; }

		canv.onmousemove = (e) => {
			if (isDrawing) {
				ctx.lineTo(e.offsetX / ratioX, e.offsetY / ratioY);
				ctx.stroke();
			}
		};

		canv.onmouseup = function () {
			isDrawing = false;
			ctx.closePath();
		};

		document.onkeydown = (e) => {
			if (e.code == "KeyR") {
				ctx.clearRect(0, 0, canv.width, canv.height);
			}
		}
	</script>
</body>

</html>
