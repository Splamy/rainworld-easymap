<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
	<title>Rainworld Easymap</title>
	<link rel="stylesheet" href="keys.css" type="text/css" />
	<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"
		integrity="sha256-0dwB5HJ3NFJpgfYQEhC/O15SjlPVMK/7r3ShU8ZnjNU=" crossorigin="anonymous"></script>

	<style>
		body {
			background: dimgray;
			margin: 0;
			padding: 0;
		}

		html,
		body,
		.map,
		.fillc {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
		}

		.part {
			position: absolute;
		}

		.map,
		canvas {
			/* IE, only works on <img> tags */
			-ms-interpolation-mode: nearest-neighbor;
			/* Firefox */
			image-rendering: crisp-edges;
			/* Chromium + Safari */
			image-rendering: pixelated;
		}

		.overlay {
			/* neded to be in same drawing group as maps */
			position: fixed;
			z-index: 2;

			width: 100%;
			height: 100%;
		}

		#imgContainer {
			background: darkgray;
			position: fixed;
		}

		#uiCats {
			position: absolute;
			display: flex;
			cursor: pointer;
			z-index: 10;
			left: 0;
			top: 0;
		}

		#uiHelp {
			position: absolute;
			display: flex;
			flex-direction: column;
			gap: 0.2em;
			z-index: 10;
			padding: 4px;
			text-align: right;
			right: 0;
			top: 0;
		}

		/* Hide help on touch devices */
		@media (-moz-touch-enabled: 1),
		(pointer:coarse) {
			#uiHelp {
				display: none;
			}
		}
	</style>
</head>

<body>
	<div id="uiCats">
	</div>
	<div id="uiHelp">
		<span class="light-keys"><kbd>Shift</kbd>+<kbd>Mouse</kbd> to draw</span><br />
		<span class="light-keys"><kbd>R</kbd> to clear</span><br />
	</div>

	<div id="imgContainer" class="">
		<canvas class="overlay" height="3500" width="6000" />
	</div>

	<script type="module">
		//@ts-check

		class Vec {
			/** @param {number} x, @param {number} y */
			constructor(x, y) {
				this.x = x;
				this.y = y;
			}

			/** @param {Vec} other */
			add(other) {
				return new Vec(this.x + other.x, this.y + other.y);
			}

			/** @param {Vec} other */
			sub(other) {
				return new Vec(this.x - other.x, this.y - other.y);
			}

			/** @returns {[number, number]} */
			toArray() {
				return [this.x, this.y];
			}
		}

		class Part {
			/** @param {string[]} srcs, @param {Vec} off, @param {Vec} size, @param {Con[]} [cons] */
			constructor(key, srcs, off, size, cons) {
				this.key = key;
				this.srcs = srcs;
				this.off = off;
				this.size = size;
				this.cons = cons || [];
			}
		}

		class Con {
			/** @param {string} to, @param {Vec} pos */
			constructor(to, pos) {
				this.to = to;
				this.pos = pos;
			}
		}

		class MapData {
			/** @param {string} tag, @param icon_src, @param {Vec} mapSize, @param {Vec} off, @param {Part[]} parts */
			constructor(tag, icon_src, mapSize, off, parts) {
				this.tag = tag;
				this.icon_src = icon_src;
				this.mapSize = mapSize;
				this.off = off;
				this.parts = parts;
			}
		}

		let selectedMap = null;
		/** @type {HTMLDivElement} */
		const pan = document.getElementById("imgContainer");
		/** @type {HTMLDivElement} */
		const mapSelections = document.getElementById("uiCats");
		const initialTransform = { x: 0, y: 0, scale: 0.2 };
		let pzInstance = panzoom(pan, {
			initialZoom: initialTransform.scale,
			beforeMouseDown: function (e) {
				return e.shiftKey || e.ctrlKey;
			}
		});

		/** @type {Map<string, MapData>} */
		const maps = new Map();

		/**
		* @param {MapData} map
		*/
		function setupMap(map) {
			maps.set(map.tag, map);
			const btn = document.createElement("img");
			btn.src = map.icon_src;
			btn.onclick = () => setbg(map.tag);
			btn.ontouchstart = () => setbg(map.tag);
			mapSelections.appendChild(btn);
		}

		function getHash() {
			return window.location.hash.substring(1);
		}

		/** @param {string} hash */
		function setHash(hash) {
			const url = new URL(window.location.toString());
			url.hash = `#${hash}`;
			window.history.pushState({}, '', url);
		}

		function updateHash() {
			const t = pzInstance.getTransform();
			let hash = `${selectedMap},${t.x.toFixed(0)},${t.y.toFixed(0)},${t.scale.toFixed(3)}`;
			setHash(hash);
		}

		function tryRestoreHash() {
			let currentHash = getHash();
			if (!currentHash) {
				return false;
			}

			const hs = currentHash.split(',');
			if (hs.length != 4) {
				return false;
			}

			const t = { x: Number(hs[1]), y: Number(hs[2]), scale: Number(hs[3]) }

			setbg(hs[0], t);
			return true;
		}

		const defaultSize = new Vec(12000, 7000);
		let canvSize = defaultSize;

		/** @param {string} tag, @param {{x: number, y: number, scale: number}} [transform] */
		function setbg(tag, transform, forceRecreate = false) {
			const data = maps.get(tag);
			if (!data) {
				return;
			}

			selectedMap = tag;

			/** @type {HTMLDivElement[]} */
			const imgs = [...pan.querySelectorAll(".map")];
			imgs.forEach(i => i.style.display = "none");
			let pic = imgs.find(i => i.dataset.mapName === data.tag);
			if (forceRecreate && pic) {
				pic.remove();
				pic = undefined;
			}
			// Create container for slugcat map if it does not exist
			if (!pic) {
				pic = document.createElement("div");
				pic.classList.add("map");
				// Create a group for all map parts, most maps are precombined
				// with only one map though.
				for (let part of data.parts) {
					let picture = document.createElement("picture");
					//picture.style.border = "4px solid green";
					picture.classList.add("part");
					pic.appendChild(picture);
					let offX = data.off.x + part.off.x;
					let offY = data.off.y + part.off.y;
					picture.style.left = `${offX}px`;
					picture.style.top = `${offY}px`;

					// Append all image variations like webp, png, etc.
					for (let src of part.srcs) {
						let source = document.createElement("source");
						source.srcset = src;
						let ext = src.substring(src.lastIndexOf('.') + 1);
						source.type = `image/${ext}`;
						picture.appendChild(source);
					}

					let source = document.createElement("img");
					source.src = part.srcs[0];
					picture.appendChild(source);
				}

				pic.dataset.mapName = data.tag;
				pan.appendChild(pic);
			}
			pic.style.display = "block";
			canvSize = data.mapSize;
			pan.style.width = `${canvSize.x}px`;
			pan.style.height = `${canvSize.y}px`;

			if (transform) {
				const t = pzInstance.getTransform();
				t.x = transform.x;
				t.y = transform.y;
				t.scale = transform.scale;
			}

			updateHash();
		}

		function debounce(func, timeout = 300) {
			let timer;
			return (...args) => {
				clearTimeout(timer);
				timer = setTimeout(() => { func.apply(this, args); }, timeout);
			};
		}
		let updateHashDebounced = debounce(updateHash, 500);

		/** @param {string} base, @param {string[]} exts, @returns {string[]} */
		let withExt = (base, exts) => exts.map(e => `${base}.${e}`);
		/** @param {string} base */
		let withDefExt = (base) => withExt(base, ['webp', 'png']);
		let withOneDefExt = (base) => [new Part("Map", withDefExt(base), new Vec(0, 0), defaultSize)];

		setupMap(new MapData('Vanilla', "img/Survivor_icon.png", defaultSize, new Vec(2453, 736), withOneDefExt('img/World_Map_Vanilla')));
		setupMap(new MapData('Downpour', "img/Gourmand_icon.png", defaultSize, new Vec(0, 1200), withOneDefExt('img/World_Map_Downpour')));
		setupMap(new MapData('Artificer', "img/Artificer_icon.png", defaultSize, new Vec(2180, 0), withOneDefExt('img/World_Map_Artificer')));
		setupMap(new MapData('Rivulet', "img/Rivulet_icon.png", defaultSize, new Vec(2180, 1200), withOneDefExt('img/World_Map_Rivulet')));
		setupMap(new MapData('Spearmaster', "img/Spearmaster_icon.png", defaultSize, new Vec(2180, 1200), withOneDefExt('img/World_Map_Spearmaster')));
		setupMap(new MapData('Saint', "img/Saint_icon.png", defaultSize, new Vec(2180, 2003), withOneDefExt('img/World_Map_Saint')));
		setupMap(new MapData('Watcher', "img/Watcher_icon.png", defaultSize, new Vec(2000, 1000), withOneDefExt('img/World_Map_Watcher')));

		if (!tryRestoreHash()) {
			setbg("Vanilla", initialTransform);
		}

		pzInstance.on('transform', function (e) {
			updateHashDebounced();

			const off = 100;
			const t = e.getTransform();

			if (t.x > window.innerWidth - off) {
				pzInstance.moveTo(window.innerWidth - off, t.y);
			} else if (t.x < off - (canvSize.x) * t.scale) {
				pzInstance.moveTo(off - (canvSize.x) * t.scale, t.y);
			}
			if (t.y > window.innerHeight - off) {
				pzInstance.moveTo(t.x, window.innerHeight - off);
			} else if (t.y < off - (canvSize.y) * t.scale) {
				pzInstance.moveTo(t.x, off - (canvSize.y) * t.scale);
			}
		});

		// Image stuff

		/** @type {HTMLCanvasElement} */
		const canv = document.querySelector(".overlay");

		// canv.style.width = `${canvW}px`;
		// canv.style.height = `${canvH}px`;

		/** @type {CanvasRenderingContext2D} */
		const ctx = canv.getContext("2d");
		ctx.imageSmoothingEnabled = false;
		var getRatio = (s) => new Vec(s.x / canv.width, s.y / canv.height);
		let isDrawing;

		canv.onmousedown = (e) => {
			if (e.shiftKey) {
				isDrawing = true;
				ctx.beginPath();
				ctx.lineWidth = 1;
				ctx.strokeStyle = "red";
				ctx.lineJoin = "round";
				ctx.lineCap = "round";
				const ratio = getRatio(canvSize);
				ctx.moveTo(e.offsetX / ratio.x, e.offsetY / ratio.y);
			}
		};

		canv.oncontextmenu = (e) => { return false; }

		canv.onmousemove = (e) => {
			if (isDrawing) {
				const ratio = getRatio(canvSize);
				ctx.lineTo(e.offsetX / ratio.x, e.offsetY / ratio.y);
				ctx.stroke();
			}
		};

		canv.onmouseup = function () {
			if (isDrawing) {
				isDrawing = false;
				ctx.closePath();
			}
		};

		document.onkeydown = (e) => {
			if (e.code == "KeyR") {
				ctx.clearRect(0, 0, canv.width, canv.height);
			}
		}
	</script>
</body>

</html>
