<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
	<title>Rainworld Easymap</title>
	<link rel="stylesheet" href="keys.css" type="text/css" />
	<script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"
		integrity="sha256-0dwB5HJ3NFJpgfYQEhC/O15SjlPVMK/7r3ShU8ZnjNU=" crossorigin="anonymous"></script>

	<style>
		body {
			background: dimgray;
			margin: 0;
			padding: 0;
		}

		html,
		body,
		.map,
		.fillc {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
		}

		.part {
			position: absolute;
		}

		.map,
		canvas {
			/* IE, only works on <img> tags */
			-ms-interpolation-mode: nearest-neighbor;
			/* Firefox */
			image-rendering: crisp-edges;
			/* Chromium + Safari */
			image-rendering: pixelated;
		}

		.overlay {
			/* neded to be in same drawing group as maps */
			position: fixed;
			z-index: 2;

			width: 100%;
			height: 100%;
		}

		#imgContainer {
			background: darkgray;
			position: fixed;
		}

		.dbgborder {
			border: black 6px solid;
		}

		#uiCats {
			position: absolute;
			display: flex;
			cursor: pointer;
			z-index: 10;
			left: 0;
			top: 0;
		}

		#uiHelp {
			position: absolute;
			display: flex;
			flex-direction: column;
			gap: 0.2em;
			z-index: 10;
			padding: 4px;
			text-align: right;
			right: 0;
			top: 0;
		}

		/* Hide help on touch devices */
		@media (-moz-touch-enabled: 1),
		(pointer:coarse) {
			#uiHelp {
				display: none;
			}
		}
	</style>
</head>

<body>
	<div id="uiCats">
	</div>
	<div id="uiHelp">
		<span class="light-keys"><kbd>Shift</kbd>+<kbd>Mouse</kbd> to draw</span><br />
		<span class="light-keys"><kbd>R</kbd> to erase</span><br />
	</div>

	<div id="imgContainer" class="">
		<canvas class="overlay" height="3500" width="6000" />
	</div>

	<script>
		//@ts-check

		/** @readonly @enum {string} */
		const WM_Main = Object.freeze({
			Sunbaked_Alley: "Sunbaked_Alley",
			Torrential_Railways: "Torrential_Railways",

			Pillar_Grove: "Pillar_Grove",

			Stormy_Coast: "Stormy_Coast",

			Blast_Deck: WM_Main.Aether_Ridge,
			Aerial_Tramway: WM_Main.Aether_Ridge,
			Ridgeworks: WM_Main.Aether_Ridge,
			Station_Annex: WM_Main.Cold_Storage,
			Thermal_Relay: WM_Main.Heat_Ducts,

		/** @readonly @enum {string} */
		const WM = Object.freeze({ ...WM_Main, ...WM_Sub });


		class Vec {
			/** @param {number} x, @param {number} y */
			constructor(x, y) {
				this.x = x;
				this.y = y;
			}
		}

		class Part {
			/** @param {string[]} srcs, @param {Vec} off, @param {Con[]} [cons] */
			constructor(key, srcs, off, cons) {
				this.key = key;
				this.srcs = srcs;
				this.off = off;
				this.cons = cons || [];
			}
		}

		class Con {
			/** @param {string} to, @param {Vec} pos */
			constructor(to, pos) {
				this.to = to;
				this.pos = pos;
			}
		}

		class MapData {
			/** @param {string} tag, @param icon_src, @param {Vec} mapSize, @param {Vec} off, @param {Part[]} parts */
			constructor(tag, icon_src, mapSize, off, parts) {
				this.tag = tag;
				this.icon_src = icon_src;
				this.mapSize = mapSize;
				this.off = off;
				this.parts = parts;
			}
		}

		let selectedMap = null;
		/** @type {HTMLDivElement} */
		const pan = document.getElementById("imgContainer");
		/** @type {HTMLDivElement} */
		const mapSelections = document.getElementById("uiCats");
		const initialTransform = { x: 0, y: 0, scale: 0.2 };
		let pzInstance = panzoom(pan, {
			initialZoom: initialTransform.scale,
			beforeMouseDown: function (e) {
				return e.shiftKey;
			}
		});

		/** @type {Map<string, MapData>} */
		const maps = new Map();

		/**
		* @param {MapData} map
		*/
		function setupMap(map) {
			maps.set(map.tag, map);
			const btn = document.createElement("img");
			btn.src = map.icon_src;
			btn.onclick = () => setbg(map.tag);
			btn.ontouchstart = () => setbg(map.tag);
			mapSelections.appendChild(btn);
		}

		function getHash() {
			return window.location.hash.substring(1);
		}

		/** @param {string} hash */
		function setHash(hash) {
			const url = new URL(window.location.toString());
			url.hash = `#${hash}`;
			window.history.pushState({}, '', url);
		}

		function updateHash() {
			const t = pzInstance.getTransform();
			let hash = `${selectedMap},${t.x.toFixed(0)},${t.y.toFixed(0)},${t.scale.toFixed(3)}`;
			setHash(hash);
		}

		function tryRestoreHash() {
			let currentHash = getHash();
			if (!currentHash) {
				return false;
			}

			const hs = currentHash.split(',');
			if (hs.length != 4) {
				return false;
			}

			const t = { x: Number(hs[1]), y: Number(hs[2]), scale: Number(hs[3]) }

			setbg(hs[0], t);
			return true;
		}

		const defaultSize = new Vec(12000, 7000);
		let canvSize = defaultSize;

		/** @param {string} tag, @param {{x: number, y: number, scale: number}} [transform] */
		function setbg(tag, transform) {
			const data = maps.get(tag);
			if (!data) {
				return;
			}

			selectedMap = tag;

			/** @type {HTMLDivElement[]} */
			const imgs = [...pan.querySelectorAll(".map")];
			imgs.forEach(i => i.style.display = "none");
			let pic = imgs.find(i => i.dataset.mapName === data.tag);
			// Create container for slugcat map if it does not exist
			if (!pic) {
				pic = document.createElement("div");
				pic.classList.add("map");
				// Create a group for all map parts, most maps are precombined
				// with only one map though.
				for (let part of data.parts) {
					let picture = document.createElement("picture");
					picture.classList.add("part");
					pic.appendChild(picture);
					let offX = data.off.x + part.off.x;
					let offY = data.off.y + part.off.y;
					picture.style.left = `${offX}px`;
					picture.style.top = `${offY}px`;

					// Append all image variations like webp, png, etc.
					for (let src of part.srcs) {
						let source = document.createElement("source");
						source.srcset = src;
						let ext = src.substring(src.lastIndexOf('.') + 1);
						source.type = `image/${ext}`;
						picture.appendChild(source);
					}

					let source = document.createElement("img");
					source.src = part.srcs[0];
					picture.appendChild(source);
				}

				let cons = getConnections(data);
				if (cons.length > 0) {
					const svgNS = "http://www.w3.org/2000/svg";
					let svg = document.createElementNS(svgNS, "svg");
					svg.classList.add("fillc");
					svg.style.width = `${data.mapSize.x}px`;
					svg.style.height = `${data.mapSize.y}px`;
					pic.appendChild(svg);

					for (let con of cons) {
						let line = document.createElementNS(svgNS, "line");
						line.setAttribute("x1", con.fromPos.x.toString());
						line.setAttribute("y1", con.fromPos.y.toString());
						line.setAttribute("x2", con.toPos.x.toString());
						line.setAttribute("y2", con.toPos.y.toString());
						if (con.from == WM.Daemon || con.to == WM.Daemon) {
							line.setAttribute("stroke", "purple");
							line.setAttribute("stroke-width", "2");
						} else {
							line.setAttribute("stroke", "red");
							line.setAttribute("stroke-width", "4");
						}
						svg.appendChild(line);
					}
				}


				pic.dataset.mapName = data.tag;
				pan.appendChild(pic);
			}
			pic.style.display = "block";
			canvSize = data.mapSize;
			pan.style.width = `${canvSize.x}px`;
			pan.style.height = `${canvSize.y}px`;

			if (transform) {
				const t = pzInstance.getTransform();
				t.x = transform.x;
				t.y = transform.y;
				t.scale = transform.scale;
			}

			updateHash();
		}

		function debounce(func, timeout = 300) {
			let timer;
			return (...args) => {
				clearTimeout(timer);
				timer = setTimeout(() => { func.apply(this, args); }, timeout);
			};
		}
		let updateHashDebounced = debounce(updateHash, 500);

		let withDefExt = (base) => withExt(base, ['webp', 'png']);

				new Con(WM.Cold_Storage, new Vec(70, 1100)), // From
			]),
			new Part(WM.Verdant_Waterways, withDefExt('img/Watcher/Verdant_Waterways_Map'), new Vec(2000, 8000), [
				new Con(WM.Fetid_Glen, new Vec(105, 80)),
				new Con(WM.Signal_Spires, new Vec(175, 315)),
				new Con(WM.Daemon, new Vec(525, 240)),
				new Con(WM.Turbulent_Pump, new Vec(1215, 545)),
			]),
			// new Part(WM.Industrial_Complex_Watcher, withDefExt('img/Watcher/Industrial_Complex_Map_Watcher_(MSC)'), new Vec(4000, 8000), []),
		]));

		/** @param { MapData } map, @returns { Array<{ from: string, to: string, fromPos: Vec, toPos: Vec }> } */
		function getConnections(map) {
			const connections = new Map();
			for (let part of map.parts) {
				for (let con of part.cons) {
					let fromPos = new Vec(part.off.x + con.pos.x, part.off.y + con.pos.y);

					let toPos = new Vec(0, 0);
					findPos: for (let targetPart of map.parts) {
						if (targetPart.key == con.to) {
							toPos = new Vec(targetPart.off.x, targetPart.off.y);

							for (let targetCon of targetPart.cons) {
								if (targetCon.to == part.key) {
									toPos = new Vec(targetPart.off.x + targetCon.pos.x, targetPart.off.y + targetCon.pos.y);
									break findPos;
								}
							}
							console.warn(`Connection ${part.key} -> ${con.to} has no return position, using part offset as fallback.`);
							break findPos;
						}
					}

					const key = [part.key, con.to].sort().join("-");
					if (!connections.has(key)) {
						connections.set(key, { from: part.key, to: con.to, fromPos, toPos });
					}
				}
			}
			return [...connections.values()];
		}

		if (!tryRestoreHash()) {
			setbg("Vanilla", initialTransform);
		}

		pzInstance.on('transform', function (e) {
			updateHashDebounced();

			const off = 100;
			const t = e.getTransform();

			if (t.x > window.innerWidth - off) {
				pzInstance.moveTo(window.innerWidth - off, t.y);
			} else if (t.x < off - (canvSize.x) * t.scale) {
				pzInstance.moveTo(off - (canvSize.x) * t.scale, t.y);
			}
			if (t.y > window.innerHeight - off) {
				pzInstance.moveTo(t.x, window.innerHeight - off);
			} else if (t.y < off - (canvSize.y) * t.scale) {
				pzInstance.moveTo(t.x, off - (canvSize.y) * t.scale);
			}
		});

		// Image stuff

		/** @type {HTMLCanvasElement} */
		const canv = document.querySelector(".overlay");

		// canv.style.width = `${canvW}px`;
		// canv.style.height = `${canvH}px`;

		/** @type {CanvasRenderingContext2D} */
		const ctx = canv.getContext("2d");
		ctx.imageSmoothingEnabled = false;
		var getRatio = (s) => new Vec(s.x / canv.width, s.y / canv.height);
		let isDrawing;

		canv.onmousedown = (e) => {
			if (!e.shiftKey) {
				return;
			}

			isDrawing = true;
			ctx.beginPath();
			ctx.lineWidth = 1;
			ctx.strokeStyle = "red";
			ctx.lineJoin = "round";
			ctx.lineCap = "round";
			const ratio = getRatio(canvSize);
			ctx.moveTo(e.offsetX / ratio.x, e.offsetY / ratio.y);
		};

		canv.oncontextmenu = (e) => { return false; }

		canv.onmousemove = (e) => {
			if (isDrawing) {
				const ratio = getRatio(canvSize);
				ctx.lineTo(e.offsetX / ratio.x, e.offsetY / ratio.y);
				ctx.stroke();
			}
		};

		canv.onmouseup = function () {
			isDrawing = false;
			ctx.closePath();
		};

		document.onkeydown = (e) => {
			if (e.code == "KeyR") {
				ctx.clearRect(0, 0, canv.width, canv.height);
			}
		}
	</script>
</body>
